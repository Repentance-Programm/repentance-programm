<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЗРАСКАЯНИЕ</title>
    <style>
        @import "https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap";
        :root { --c: #c2dbc3; --f: "Share Tech Mono", monospace; }
        body { margin: 0; background: #191719; color: var(--c); font-family: var(--f); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .v { position: fixed; inset: 0; pointer-events: none; z-index: 101; background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.5) 65%, rgba(0,0,0,0.9) 100%); }
        .crt { position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); z-index: 100; }
        .n { position: fixed; inset: 0; pointer-events: none; z-index: 99; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)'/%3E%3C/svg%3E"); animation: s 0.1s infinite; }
        .g { position: relative; text-transform: uppercase; letter-spacing: .5em; text-shadow: 0 0 10px #78ad7a80; }
        .g:before, .g:after { content: attr(data-text); position: absolute; inset: 0; }
        .g:before { animation: g1 .3s infinite linear alternate-reverse; clip-path: polygon(0 0,100% 0,100% 35%,0 35%); color: #c25555; }
        .g:after { animation: g2 .3s infinite linear alternate-reverse; clip-path: polygon(0 65%,100% 65%,100% 100%,0 100%); color: #66a3cc; }
        .box { border: 1px solid #1d261e; background: rgba(13, 13, 13, 0.6); padding: 3rem 2rem; width: 450px; text-align: center; z-index: 10; position: relative; box-sizing: border-box; }
        .box.banned { border-color: #c25555; }
        input { width: 100%; background: transparent; border: 1px solid #1d261e; padding: 0.8rem; color: var(--c); font-family: var(--f); outline: none; margin-top: 1.5rem; text-align: center; letter-spacing: 2px; box-sizing: border-box; }
        #st { font-size: 0.75rem; color: #99b99a; min-height: 4em; text-transform: lowercase; line-height: 1.5; }
        .err { color: #c25555 !important; } .ok { color: #78ad7a !important; }
        .timer { font-size: 1.3rem; display: block; margin-top: 10px; color: #c25555; }
        .dl { height: 1px; background: var(--c); opacity: 0.2; margin: 5px 0; }
        .dec { width: 450px; z-index: 10; }
        @keyframes s { 0% { transform: translate(0,0) } 50% { transform: translate(-1%, 1%) } 100% { transform: translate(1%, -1%) } }
        @keyframes g1 { 0%, 100% { transform: translate(0) } 20% { transform: translate(-2px) } }
        @keyframes g2 { 0%, 100% { transform: translate(0) } 20% { transform: translate(2px) } }
    </style>
</head>
<body>
    <div class="v"></div><div class="crt"></div><div class="n"></div>
    <div class="dec" style="margin-bottom: 2.5rem;">
        <div class="dl" style="width: 75%;"></div>
        <div class="dl" style="width: 50%; margin-left: 1.5rem;"></div>
    </div>
    <div style="text-align: center; margin-bottom: 2rem; z-index: 10;">
        <div class="g" style="font-size: 0.75rem; opacity: 0.8;" data-text="система">система</div>
        <div class="g" style="font-size: 2.2rem; display: block; margin-top: 0.5rem;" data-text="ИЗРАСКАЯНИЕ">ИЗРАСКАЯНИЕ</div>
    </div>
    <div class="box" id="bx">
        <div id="st">введите логин для выведения испытуемого из "израскаяния"</div>
        <input type="text" id="ui" placeholder="[идентификатор]" autocomplete="off">
    </div>
    <div class="dec" style="margin-top: 2.5rem;">
        <div class="dl" style="width: 66%; margin-left: auto;"></div>
        <div class="dl" style="width: 85%; margin-right: 1.5rem; margin-left: auto;"></div>
        <div style="font-size: 0.65rem; opacity: 0.4; text-align: center; margin-top: 1.5rem; letter-spacing: 0.3em;">
            протокол v.3.1.0 // терминал активен
        </div>
    </div>

    <script>
        (function() {
            const ui = document.getElementById('ui'), st = document.getElementById('st'), bx = document.getElementById('bx'), orig = st.innerText;
            
            // Расшифровка с поддержкой русского языка
            const decodeB64 = (str) => {
                try {
                    return decodeURIComponent(escape(atob(str)));
                } catch(e) {
                    return atob(str); // Запасной вариант
                }
            };

            const data = {
                // "алекс", "александр", "23"
                k: ["0LDQu9C10LrRgQ==", "0LDQu9C10LrRgdCw0L3QtNGA", "MjM="],
                r: "0YHQsdGA0L7RgQ==",
                w: "YUhSMGNITTZMeTlrYVhOamIzSmtMbU52YlM5aGNHa3ZkMlZpYUc5dmEzTXZNVFE1TnpZME1EUTBPREV4TWpRMk5EQTJNaTlqVDE5YVZGRTNYekUyTUhaRmMzQlFRbnBoYzJvd1RVSmZRVjlQTFVwU1dIZzVMVmt3Wkc1blpYTkxkVms1V0RSMFZHbDFjMUZpY1d0SGJEWjBkemg2WjE5V2JnPT0="
            };

            function fT(ms) {
                const s = Math.max(0, Math.floor(ms / 1000)), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }

            let t;
            function check() {
                const b = localStorage.getItem('ban');
                if (b) {
                    const r = parseInt(b) - Date.now();
                    if (r > 0) {
                        bx.classList.add('banned');
                        st.innerHTML = `ДОСТУП ЗАБЛОКИРОВАН<br><span class="timer">${fT(r)}</span>`;
                        st.className = "err";
                        if (!t) t = setInterval(check, 1000);
                        return true;
                    } else {
                        localStorage.removeItem('ban'); localStorage.setItem('at', '0');
                        bx.classList.remove('banned'); st.innerText = orig; st.className = "";
                        clearInterval(t); t = null;
                    }
                }
                return false;
            }

            check();

            ui.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter') {
                    const raw = ui.value.trim();
                    const val = raw.toLowerCase();
                    ui.value = '';
                    
                    if (!val) return;
                    if (val === decodeB64(data.r)) { localStorage.clear(); location.reload(); return; }
                    if (check()) return;

                    // Проверка совпадения
                    const keys = data.k.map(decodeB64);
                    if (keys.includes(val)) {
                        st.innerText = "ОБЪЕКТ НАЙДЕН. НАЧИНАЮ ВЫВОД..."; st.className = "ok";
                        localStorage.setItem('at', '0');
                        
                        try {
                            const webhookUrl = decodeB64(decodeB64(data.w));
                            await fetch(webhookUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    embeds: [{
                                        title: "✅ СИСТЕМА: ВЫВОД ИЗ ИЗРАСКАЯНИЯ",
                                        description: `Объект **${raw}** успешно прошёл авторизацию и выведен из системы.`,
                                        color: 7908730,
                                        footer: { text: "Протокол v.3.1.0" },
                                        timestamp: new Date().toISOString()
                                    }]
                                })
                            });
                        } catch(err) {
                            console.error("Webhook Error:", err);
                        }
                    } else {
                        let a = parseInt(localStorage.getItem('at') || '0') + 1;
                        localStorage.setItem('at', a);
                        if (a >= 5) {
                            localStorage.setItem('ban', Date.now() + 10800000); check();
                        } else {
                            st.innerText = `ОШИБКА: ОБЪЕКТ НЕ НАЙДЕН. ОСТАЛОСЬ: ${5 - a}`; st.className = "err";
                        }
                    }
                }
            });
        })();
    </script>
</body>
</html>
